# JVM args sized for a modest CI runner; bump on developer machines if needed.
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8

# Use the official Kotlin code style and AndroidX everywhere.
android.useAndroidX=true
kotlin.code.style=official

# Don't bundle R-class entries from dependencies; smaller AARs.
android.nonTransitiveRClass=true
